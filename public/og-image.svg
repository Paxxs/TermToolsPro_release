<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">TermTools Pro Open Graph image</title>
  <desc id="description">Terminal themed social preview for TermTools Pro.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f" />
      <stop offset="0.45" stop-color="#0f2f38" />
      <stop offset="1" stop-color="#163f33" />
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10212b" />
      <stop offset="1" stop-color="#071016" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#56c6be" />
      <stop offset="1" stop-color="#8bd86f" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.42" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="990" cy="110" r="260" fill="#56c6be" opacity="0.13" />
  <circle cx="120" cy="570" r="280" fill="#8bd86f" opacity="0.12" />

  <g opacity="0.22" stroke="#ffffff" stroke-width="1">
    <path d="M0 126H1200" />
    <path d="M0 252H1200" />
    <path d="M0 378H1200" />
    <path d="M0 504H1200" />
    <path d="M240 0V630" />
    <path d="M480 0V630" />
    <path d="M720 0V630" />
    <path d="M960 0V630" />
  </g>

  <g transform="translate(88 76)">
    <text x="0" y="42" fill="#b8f7e9" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="0">TERMTOOLS PRO</text>
    <text x="0" y="134" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="800" letter-spacing="0">Record. Replay.</text>
    <text x="0" y="206" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="800" letter-spacing="0">Share CLI work.</text>
    <text x="0" y="270" fill="#cde8e0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500" letter-spacing="0">Terminal demos and docs for developers.</text>
  </g>

  <g transform="translate(114 390)">
    <rect x="0" y="0" width="326" height="62" rx="31" fill="url(#accent)" />
    <text x="33" y="40" fill="#07131f" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800" letter-spacing="0">macOS + Linux</text>
  </g>

  <g transform="translate(640 96)" filter="url(#shadow)">
    <rect x="0" y="0" width="464" height="392" rx="28" fill="url(#terminal)" stroke="#315260" />
    <rect x="0" y="0" width="464" height="58" rx="28" fill="#132a35" />
    <circle cx="34" cy="29" r="8" fill="#ff6b6b" />
    <circle cx="62" cy="29" r="8" fill="#ffd166" />
    <circle cx="90" cy="29" r="8" fill="#6ee7b7" />
    <text x="28" y="106" fill="#6ee7b7" font-family="Menlo, Consolas, monospace" font-size="23" font-weight="700">$ termtools record demo</text>
    <text x="28" y="154" fill="#d6f8ef" font-family="Menlo, Consolas, monospace" font-size="22">capture session... done</text>
    <text x="28" y="202" fill="#8bd86f" font-family="Menlo, Consolas, monospace" font-size="22">replay speed: 1.25x</text>
    <text x="28" y="250" fill="#d6f8ef" font-family="Menlo, Consolas, monospace" font-size="22">export: gif, mp4, asciicast</text>
    <rect x="28" y="294" width="350" height="14" rx="7" fill="#56c6be" opacity="0.78" />
    <rect x="28" y="326" width="232" height="14" rx="7" fill="#8bd86f" opacity="0.72" />
  </g>
</svg>
